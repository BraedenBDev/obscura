<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Obscura</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="container">
        <!-- Header -->
        <header class="header">
            <div class="header-content">
                <h1>
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                    Obscura
                </h1>
                <div class="status-dot" id="statusDot"></div>
            </div>
            <button class="settings-btn" id="settingsBtn" title="Settings">
                <svg viewBox="0 0 16 16" fill="currentColor"><path d="M9.405 1.05c-.413-1.4-2.397-1.4-2.81 0l-.1.34a1.464 1.464 0 01-2.105.872l-.31-.17c-1.283-.698-2.686.705-1.987 1.987l.169.311c.446.82.023 1.841-.872 2.105l-.34.1c-1.4.413-1.4 2.397 0 2.81l.34.1a1.464 1.464 0 01.872 2.105l-.17.31c-.698 1.283.705 2.686 1.987 1.987l.311-.169a1.464 1.464 0 012.105.872l.1.34c.413 1.4 2.397 1.4 2.81 0l.1-.34a1.464 1.464 0 012.105-.872l.31.17c1.283.698 2.686-.705 1.987-1.987l-.169-.311a1.464 1.464 0 01.872-2.105l.34-.1c1.4-.413 1.4-2.397 0-2.81l-.34-.1a1.464 1.464 0 01-.872-2.105l.17-.31c.698-1.283-.705-2.686-1.987-1.987l-.311.169a1.464 1.464 0 01-2.105-.872l-.1-.34zM8 10.93a2.929 2.929 0 110-5.86 2.929 2.929 0 010 5.858z"/></svg>
            </button>
        </header>

        <!-- Main Content -->
        <main class="main">
            <!-- Input Section -->
            <div class="input-section">
                <label for="textInput">Paste Text to Scan</label>
                <textarea id="textInput" class="text-input" placeholder="Paste emails, phone numbers, SSN, credit cards, or any text containing PII..."></textarea>
                <span class="char-info" id="charCount">0 characters</span>
            </div>

            <!-- Buttons -->
            <div class="buttons-section">
                <button id="detectBtn" class="btn btn-primary">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M11.742 10.344a6.5 6.5 0 10-1.397 1.398h-.001c.03.04.062.078.098.115l3.85 3.85a1 1 0 001.415-1.414l-3.85-3.85a1.007 1.007 0 00-.115-.1zM12 6.5a5.5 5.5 0 11-11 0 5.5 5.5 0 0111 0z"/></svg>
                    Detect PII
                </button>
                <button id="anonymizeBtn" class="btn btn-secondary">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path d="M4 4v8h8V4H4zm0-1.5A1.5 1.5 0 002.5 4v8A1.5 1.5 0 004 13.5h8a1.5 1.5 0 001.5-1.5V4A1.5 1.5 0 0012 2.5H4z"/><path d="M11 7H5v2h6V7z"/></svg>
                    Mask PII
                </button>
                <button id="clearBtn" class="btn btn-secondary">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zm4.5 0V3h2.25a.75.75 0 010 1.5H2.75a.75.75 0 010-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75zM4.496 6.675a.75.75 0 10-1.492.15l.66 6.6A1.75 1.75 0 005.405 15h5.19c.9 0 1.652-.681 1.741-1.576l.66-6.6a.75.75 0 00-1.492-.149l-.66 6.6a.25.25 0 01-.249.225h-5.19a.25.25 0 01-.249-.225l-.66-6.6z"/></svg>
                    Clear
                </button>
            </div>

            <!-- Results Section -->
            <div id="resultsSection" class="results-section hidden">
                <div class="results-header">
                    <h2>Detection Results</h2>
                    <button id="copyBtn" class="copy-btn">Copy</button>
                </div>
                <div id="resultsList" class="results-content"></div>
            </div>

            <!-- Loading -->
            <div id="loadingSection" class="loading hidden">
                <div class="spinner"></div>
                <p>Scanning for PII...</p>
            </div>

            <!-- Error -->
            <div id="errorSection" class="error-message hidden"></div>
        </main>

        <!-- Footer -->
        <footer class="footer">
            <p>Obscura v1.0 | All processing is local and private</p>
        </footer>
    </div>

    <script src="popup.js"></script>
</body>
</html>
