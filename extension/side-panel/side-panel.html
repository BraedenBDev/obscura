<!DOCTYPE html>
<html lang="en" style="width: 100%; height: 100%;">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy"
        content="default-src 'self'; style-src 'self' 'unsafe-inline'; connect-src 'self' http://localhost:5001;">
    <title>Obscura</title>
    <link rel="stylesheet" href="side-panel.css">
</head>

<body>
    <div class="container">
        <div class="header">
            <div class="title">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/></svg>
                Obscura
            </div>
            <div class="subtitle">
                Privacy Protection
            </div>
        </div>

        <div class="status-bar">
            <div class="status-dot" id="statusDot"></div>
            <span id="statusText">Connecting...</span>
        </div>

        <div class="content">
            <div class="state-indicator">
                <span class="state-label" id="stateLabel">Original Text</span>
                <span class="char-count" id="charCount">0 characters</span>
            </div>

            <div class="text-wrapper">
                <div class="textarea-container">
                    <textarea id="textArea"
                        placeholder="Paste text with PII (emails, phone numbers, SSN, etc.)..."></textarea>
                    <div class="copy-btn-wrapper">
                        <div class="copy-icon" id="copyIcon" title="Copy to clipboard">
                            <svg viewBox="0 0 16 16" fill="currentColor"><path d="M0 6.75C0 5.784.784 5 1.75 5h1.5a.75.75 0 010 1.5h-1.5a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-1.5a.75.75 0 011.5 0v1.5A1.75 1.75 0 019.25 16h-7.5A1.75 1.75 0 010 14.25v-7.5z"/><path d="M5 1.75C5 .784 5.784 0 6.75 0h7.5C15.216 0 16 .784 16 1.75v7.5A1.75 1.75 0 0114.25 11h-7.5A1.75 1.75 0 015 9.25v-7.5zm1.75-.25a.25.25 0 00-.25.25v7.5c0 .138.112.25.25.25h7.5a.25.25 0 00.25-.25v-7.5a.25.25 0 00-.25-.25h-7.5z"/></svg>
                        </div>
                    </div>
                </div>
            </div>

            <div class="info-box" id="infoBox">
                <strong>How it works:</strong> Click <strong>Mask</strong> to replace PII with placeholders.
                Click <strong>Restore</strong> to get original values back.
            </div>

            <div class="stats-box" id="statsBox">
                Statistics will appear here
            </div>

            <div class="loading" id="loading">
                <div class="spinner"></div>
            </div>

            <div class="buttons-section">
                <button id="anonymizeBtn" class="btn btn-anonymize" disabled>
                    <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M4 4v8h8V4H4zm0-1.5A1.5 1.5 0 002.5 4v8A1.5 1.5 0 004 13.5h8a1.5 1.5 0 001.5-1.5V4A1.5 1.5 0 0012 2.5H4z"/><path d="M11 7H5v2h6V7z"/></svg>
                    Mask PII
                </button>

                <button id="restoreBtn" class="btn btn-restore">
                    <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M1.5 8a6.5 6.5 0 1113 0 6.5 6.5 0 01-13 0zM8 0a8 8 0 100 16A8 8 0 008 0zM5 8a1 1 0 011-1h4a1 1 0 110 2H6a1 1 0 01-1-1z"/></svg>
                    Restore
                </button>

                <div class="btn-bottom-row">
                    <button id="clearBtn" class="btn btn-clear">
                        <svg viewBox="0 0 16 16" fill="currentColor"><path fill-rule="evenodd" d="M6.5 1.75a.25.25 0 01.25-.25h2.5a.25.25 0 01.25.25V3h-3V1.75zm4.5 0V3h2.25a.75.75 0 010 1.5H2.75a.75.75 0 010-1.5H5V1.75C5 .784 5.784 0 6.75 0h2.5C10.216 0 11 .784 11 1.75zM4.496 6.675a.75.75 0 10-1.492.15l.66 6.6A1.75 1.75 0 005.405 15h5.19c.9 0 1.652-.681 1.741-1.576l.66-6.6a.75.75 0 00-1.492-.149l-.66 6.6a.25.25 0 01-.249.225h-5.19a.25.25 0 01-.249-.225l-.66-6.6z"/></svg>
                        Clear
                    </button>
                </div>
            </div>
        </div>

        <div class="footer">
            All processing is local and private • Your data never leaves your device
        </div>
    </div>

    <script src="side-panel.js"></script>
</body>

</html>
